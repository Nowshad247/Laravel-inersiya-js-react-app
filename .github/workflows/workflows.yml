name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
      - production
  push:
    branches:
      - main
      - production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUNNER_OS: ubuntu-latest  # Change to "[self-hosted, linux]" on Rocky self-hosted runner

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Laravel CI
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laracrafr_test
          MYSQL_USER: laravel
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APP_DEBUG: true
      CACHE_DRIVER: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: laracrafr_test
      DB_USERNAME: laravel
      DB_PASSWORD: secret

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          extensions: mbstring, bcmath, ctype, fileinfo, json, tokenizer, xml, pdo, pdo_mysql, openssl, curl, zip, imagick, swoole
          ini-values: memory_limit=-1
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.4-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.4-

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install JS dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Generate Wayfinder types
        run: php artisan wayfinder:generate --with-form --no-interaction

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Check PHP code style (Pint)
        run: vendor/bin/pint --dirty

      - name: Check frontend formatting
        run: npm run format:check

      - name: Check frontend types
        run: npm run types

      - name: Build frontend assets
        run: npm run build

      - name: Run PHP tests
        run: php artisan test

      - name: Validate deploy key exists
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "KEY IS EMPTY"
            exit 1
          else
            echo "KEY EXISTS"
          fi

  deploy:
    name: Deploy to Rocky Linux
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '2222'}}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            # 1. Update Code
            git fetch origin
            git reset --hard "origin/${{ github.ref_name }}"

            # 2. Dependency Management
            composer install --no-interaction --no-dev --prefer-dist --optimize-autoloader

            # 3. Frontend
            if command -v npm >/dev/null 2>&1; then
              npm ci
              npm run build
            else
              echo "npm not installed on deploy server; skip frontend build"
            fi

            # 4. Database & Cache (Rocky-friendly)
            php artisan migrate --force
            php artisan optimize:clear
            php artisan optimize

            # 5. Rocky/RHEL file permissions
            WEB_USER=apache
            if id -u nginx >/dev/null 2>&1; then WEB_USER=nginx; fi
            sudo chown -R "$WEB_USER":"$WEB_USER" .
            sudo chmod -R 775 storage bootstrap/cache

            # 6. SELinux support (Rocky/Linux)
            if command -v semanage >/dev/null 2>&1; then
              sudo semanage fcontext -a -t httpd_sys_rw_content_t "${{ secrets.DEPLOY_PATH }}/storage(/.*)?" 2>/dev/null || true
              sudo semanage fcontext -a -t httpd_sys_rw_content_t "${{ secrets.DEPLOY_PATH }}/bootstrap/cache(/.*)?" 2>/dev/null || true
              sudo restorecon -Rv storage bootstrap/cache
            fi

            # 7. Post-deploy cleanup
            php artisan route:cache
            php artisan config:cache
            php artisan view:cache
