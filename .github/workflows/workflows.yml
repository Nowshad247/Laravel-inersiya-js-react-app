name: CI/CD Pipeline

'on':
  pull_request:
    branches:
      - main
      - production
  push:
    branches:
      - main
      - production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Laravel CI
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laracrafr_test
          MYSQL_USER: laravel
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APP_DEBUG: true
      CACHE_DRIVER: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: laracrafr_test
      DB_USERNAME: laravel
      DB_PASSWORD: secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          extensions: mbstring, bcmath, ctype, fileinfo, json, tokenizer, xml, pdo, pdo_mysql, openssl, curl, zip, imagick, swoole
          ini-values: memory_limit=-1
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.4-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.4-

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install JS dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Generate Wayfinder types
        run: php artisan wayfinder:generate --with-form --no-interaction

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Check PHP code style (Pint)
        run: vendor/bin/pint --dirty

      - name: Check frontend formatting
        run: npm run format:check

      - name: Check frontend types
        run: npm run types

      - name: Build frontend assets
        run: npm run build

      - name: Run PHP tests
        run: php artisan test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: >-
      github.event_name == 'push' &&
      (github.ref_name == 'main' || github.ref_name == 'production')

    steps:
      - name: Validate deploy secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          test -n "202.59.209.159" || { echo "Missing SSH_HOST secret"; exit 1; }
          test -n "nowshad" || { echo "Missing SSH_USERNAME secret"; exit 1; }
          test -n "ssh-rsa  nowshad@localhost.localdomain" || { echo "Missing SSH_PRIVATE_KEY secret"; exit 1; }
          test -n "/data/sdcapp" || { echo "Missing DEPLOY_PATH secret"; exit 1; }

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '2222' }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --all
            git checkout "${{ github.ref_name }}"
            git pull origin "${{ github.ref_name }}"
            composer install --no-interaction --no-dev --prefer-dist --optimize-autoloader
            php artisan migrate --force
            npm ci
            npm run build
            mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache
            chmod -R ug+rwX storage bootstrap/cache
            find storage bootstrap/cache -type d -exec chmod 775 {} \;
            find storage bootstrap/cache -type f -exec chmod 664 {} \;
            if [ -n "${{ secrets.WEB_USER }}" ] && [ -n "${{ secrets.WEB_GROUP }}" ]; then
              sudo chown -R "${{ secrets.WEB_USER }}:${{ secrets.WEB_GROUP }}" storage bootstrap/cache || chown -R "${{ secrets.WEB_USER }}:${{ secrets.WEB_GROUP }}" storage bootstrap/cache || true
            fi
            php artisan optimize:clear
            php artisan optimize